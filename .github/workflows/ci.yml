name: C++ CI with Crow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true 

    - name: Install dependencies
      run: |
        sudo apt-get update
        # Install C++ compiler and essential Crow dependencies
        sudo apt-get install cmake make libasio-dev

    - name: Configure CMake
      # Create a build directory and run cmake to configure the project
      run: cmake -B ${{github.workspace}}/build

    - name: Build
      # Build the project using the configuration generated by CMake
      run: cmake --build ${{github.workspace}}/build

    - name: Run application (optional, for testing in CI)
      # Assuming your application binary is at build/your_app_name
      # You might need to adjust the path based on your CMake output
      run: |
        # Example: start server in background, run some test requests, then kill it
        # build/your_app_name &
        # sleep 5 # Give server time to start
        # curl http://localhost:18080 # Example test request if you have a simple route
        # ...
      # continue-on-error: true # use this if your tests might fail but you want the build to pass
