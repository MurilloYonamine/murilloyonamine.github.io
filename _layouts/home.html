---
title: Murillo Gomes Yonamine
layout: default
---
<div class="mid-section-home">
    <h1>
        <span>{% if page.lang == 'en' %}I am {% else %}Eu sou {% endif %}</span>
        {% if page.lang == 'en' %}
          <span id="typewriter-text" data-phrases="{{ site.author_name }}||a game developer||a software engineer"></span>
        {% else %}
          <span id="typewriter-text" data-phrases="{{ site.author_name }}||um desenvolvedor de jogos||um engenheiro de software"></span>
        {% endif %}
    </h1>
    <div class="nav-separator"></div>

    <div class="row sub-heading">
        <div class="nav-link">
            {% include navigation.html %}
        </div>
        {{ content }}
    </div>

    <div class="logos-bar">
        <a href="https://murilloyonamine.itch.io/" target="_blank" rel="noopener noreferrer" class="logo-link"
            title="Itch.io">
            <img src="{{ '/assets/img/logos/itch-io-logo.svg' | relative_url }}" alt="Itch.io logo">
            <span class="logo-caption">itch.io</span>
        </a>

        <a href="https://github.com/MurilloYonamine" target="_blank" rel="noopener noreferrer" class="logo-link"
            title="GitHub">
            <img src="{{ '/assets/img/logos/github-logo.svg' | relative_url }}" alt="GitHub logo">
            <span class="logo-caption">GitHub</span>
        </a>

        <a href="https://www.linkedin.com/in/murillo-yonamine/" target="_blank" rel="noopener noreferrer"
            class="logo-link" title="LinkedIn">
            <img src="{{ '/assets/img/logos/linkedin-logo.svg' | relative_url }}" alt="LinkedIn logo">
            <span class="logo-caption">LinkedIn</span>
        </a>
    </div>
</div>

<script src="/assets/js/typewritterEffect.js"></script>
